# ─────────────────────────────────────────────
# 水利工地监管系统 - Nginx 反向代理配置
# ─────────────────────────────────────────────

upstream gateway {
    server gateway:8001;
}

# AI Coordinator
upstream coordinator {
    server ai-coordinator:8084;
}

# AI Vision
upstream ai_vision {
    server ai-vision:8082;
}

# AI Voice
upstream ai_voice {
    server ai-voice:8083;
}

# Video Streamer
upstream video_streamer {
    server video-streamer:8081;
}

server {
    listen 80;
    server_name _;

    # ── AI 视觉检测 API ──────────────────────
    location /api/vision/ {
        proxy_pass http://ai_vision/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── AI 语音处理 API ──────────────────────
    location /api/voice/ {
        proxy_pass http://ai_voice/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── AI 调度中心 API ──────────────────────
    location /api/coordinator/ {
        proxy_pass http://coordinator/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── 视频流服务 API ───────────────────────
    location /api/streamer/ {
        proxy_pass http://video_streamer/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── 后端业务 API（经由 Gateway 统一接入）────
    location /api/ {
        proxy_pass http://gateway/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── ThingsBoard Web UI ──────────────────
    location /thingsboard/ {
        proxy_pass http://thingsboard:9090/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── EasyDarwin FLV 流 ───────────────────
    location /flv/ {
        proxy_pass http://easy-darwin:8080/;
        proxy_set_header Host $host;
    }

    # ── 健康检查 ─────────────────────────────
    location /health {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ── 前端静态资源（可选）──────────────────
    # location / {
    #     root /usr/share/nginx/html;
    #     try_files $uri $uri/ /index.html;
    # }
}
