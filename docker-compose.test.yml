# ============================================================
# 联调测试 docker-compose
# ============================================================
# 用法: docker-compose -f docker-compose.test.yml up --profile test
# ============================================================

version: "3.9"

services:

  # ───────────────────────────────────────────────
  # 测试用例：传感器数据上报测试
  # ───────────────────────────────────────────────
  test-sensor-collector:
    build: ./sensor-collector
    container_name: water-safety-test-sensor
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - COORDINATOR_URL=http://ai-coordinator:8084
      - TB_TOKEN=test-token
      - LOG_LEVEL=DEBUG
    networks:
      - water-safety-net
    profiles:
      - test
    command: >
      python -c "
      import asyncio, httpx, json, random, time
      async def test_sensor_data():
          print('Testing sensor data reporting...')
          async with httpx.AsyncClient() as client:
              data = {
                  'sensor_id': 'temp-001',
                  'type': 'temperature',
                  'value': round(random.uniform(20, 35), 2),
                  'unit': 'celsius',
                  'timestamp': time.time()
              }
              resp = await client.post(
                  'http://sensor-collector:8085/api/report',
                  json=data,
                  timeout=5.0
              )
              print(f'Sensor report: {resp.status_code}')
      asyncio.run(test_sensor_data())
      "

  # ───────────────────────────────────────────────
  # 测试用例：AI Vision 检测测试
  # ───────────────────────────────────────────────
  test-ai-vision:
    build: ./ai-vision
    container_name: water-safety-test-vision
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - COORDINATOR_URL=http://ai-coordinator:8084
      - LOG_LEVEL=DEBUG
    networks:
      - water-safety-net
    profiles:
      - test
    command: >
      python -c "
      import asyncio, httpx, base64, json
      from PIL import Image
      from io import BytesIO

      async def test_vision():
          print('Testing AI Vision...')
          img = Image.new('RGB', (100, 100), color='red')
          buffer = BytesIO()
          img.save(buffer, format='JPEG')
          img_b64 = base64.b64encode(buffer.getvalue()).decode()

          async with httpx.AsyncClient() as client:
              resp = await client.post(
                  'http://ai-vision:8082/api/detect',
                  json={'image': img_b64, 'type': 'image'},
                  timeout=30.0
              )
              print(f'AI Vision: {resp.status_code}')

      asyncio.run(test_vision())
      "

  # ───────────────────────────────────────────────
  # 测试用例：后端 API 健康检查
  # ───────────────────────────────────────────────
  test-backend:
    build: ./backend
    container_name: water-safety-test-backend
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://thingsboard:thingsboard@thingsboard-db:5432/water_safety
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=test-secret-key
      - LOG_LEVEL=DEBUG
    networks:
      - water-safety-net
    profiles:
      - test
    command: >
      python -c "
      import asyncio, httpx

      async def test_backend():
          print('Testing Backend API...')
          async with httpx.AsyncClient() as client:
              resp = await client.get('http://backend:8000/health', timeout=5.0)
              print(f'Health: {resp.status_code} - {resp.json()}')
              resp = await client.post(
                  'http://backend:8000/api/auth/login',
                  json={'username': 'admin', 'password': 'admin123'},
                  timeout=5.0
              )
              print(f'Login: {resp.status_code}')

      asyncio.run(test_backend())
      "

  # ───────────────────────────────────────────────
  # 测试用例：端到端告警流程
  # ───────────────────────────────────────────────
  test-e2e-alert:
    container_name: water-safety-test-e2e
    image: curlimages/curl:latest
    depends_on:
      - backend
      - ai-coordinator
    networks:
      - water-safety-net
    profiles:
      - test
    command: >
      sh -c '
      echo "Testing E2E alert flow..."
      sleep 5

      echo "1. Getting auth token..."
      TOKEN=$(curl -s -X POST http://backend:8000/api/auth/login \
        -H "Content-Type: application/json" \
        -d "{\"username\":\"admin\",\"password\":\"admin123\"}" | python3 -c "import sys,json; print(json.load(sys.stdin).get(\"access_token\",\"\"))")
      echo "Token: ${TOKEN:0:20}..."

      echo "2. Creating alert..."
      curl -s -X POST http://backend:8000/api/alerts \
        -H "Authorization: Bearer $TOKEN" \
        -H "Content-Type: application/json" \
        -d "{\"title\":\"E2E Test Alert\",\"level\":\"P1\",\"description\":\"End-to-end test\",\"location\":\"Site 1\"}"
      echo "Alert created"

      echo "3. Querying alerts..."
      curl -s http://backend:8000/api/alerts -H "Authorization: Bearer $TOKEN" | python3 -c "import sys,json; d=json.load(sys.stdin); print(f\"Total: {d.get(\"total\",0)}\")"
      echo "E2E test complete"
      '

networks:
  water-safety-net:
    external: true
