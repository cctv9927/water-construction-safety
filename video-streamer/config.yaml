# 摄像头配置
cameras:
  - name: 工地入口
    camera_id: CAM-001
    rtsp_url: rtsp://camera-ip-1:554/stream
    enabled: true
    ai_detection: true
    stream_quality: high
    fps: 25
    resolution: 1920x1080
    
  - name: 高边坡监控
    camera_id: CAM-002
    rtsp_url: rtsp://camera-ip-2:554/stream
    enabled: true
    ai_detection: true
    stream_quality: high
    fps: 25
    resolution: 1920x1080
    
  - name: 材料堆放区
    camera_id: CAM-003
    rtsp_url: rtsp://camera-ip-3:554/stream
    enabled: true
    ai_detection: false
    stream_quality: medium
    fps: 15
    
  - name: 塔吊监控
    camera_id: CAM-004
    rtsp_url: rtsp://camera-ip-4:554/stream
    enabled: true
    ai_detection: true
    ptz_control: true
    presets:
      - name: 全景
        position: 0,0,0
      - name: 特写
        position: 180,45,10

# 流媒体服务
streaming:
  server: easy-darwin
  rtmp_port: 1935
  http_port: 8080
  hls_enabled: true
  hls_path: /usr/local/minglong/workspace/hls
  hls_segment_duration: 2
  hls_list_size: 10

# AI 检测配置
ai_detection:
  enabled: true
  model_path: /models/yolov8n.pt
  confidence_threshold: 0.5
  nms_threshold: 0.4
  classes:
    - person
    - helmet
    - vest
    - vehicle
    - machinery
  alert_on:
    - person_without_helmet
    - person_without_vest
    - unauthorized_vehicle

# 录像配置
recording:
  enabled: true
  storage_path: /录像
  retention_days: 30
  motion_detection: true
  schedule:
    - name: 全天录制
      enabled: true
      time_range: "00:00-24:00"
      days: [0,1,2,3,4,5,6]
